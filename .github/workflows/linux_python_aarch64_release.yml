name: Linux Python aarch64 release

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  linux-python-aarch64-release:
    runs-on: [self-hosted, Linux, ARM64]
    container: quay.io/pypa/manylinux_2_28_aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and smoke-test wheels
        run: scripts/build_python_wheels_manylinux.sh wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: lebai-linux-aarch64-whl
          path: wheelhouse/*.whl
