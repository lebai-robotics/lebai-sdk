name: C++ release
run-name: ${{ github.actor }} C++ release

on:
  workflow_dispatch:
  workflow_call:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read

jobs:
  linux-cpp-package:
    name: Linux ${{ matrix.name }} C++ package
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x64
            runner: ubuntu-22.04
          - name: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git python3-pip python3-dev doxygen graphviz dpkg-dev

      - name: Configure
        run: cmake -S . -B build -DBUILD_DEB=ON -DBUILD_DOCUMENTATION=OFF -DBUILD_EXAMPLES=OFF -DBUILD_TESTING=OFF

      - name: Build and pack
        run: |
          cmake --build build
          cd build
          cpack

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: lebai-linux-${{ matrix.name }}-deb
          path: build/*.deb

  windows-cpp-package:
    name: Windows x64 C++ package
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DBUILD_NSIS=ON -DBUILD_DOCUMENTATION=OFF -DBUILD_EXAMPLES=OFF -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Pack
        run: |
          cd build
          cpack -C Release

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: lebai-win-x64-exe
          path: build/*.exe
