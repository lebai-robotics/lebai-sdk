name: Python release
run-name: ${{ github.actor }} Python release

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      PYLEBAI:
        required: false
  push:
    tags:
      - v*.*.*

permissions:
  contents: read

jobs:
  linux-python-amd64:
    uses: ./.github/workflows/linux_python_release.yml

  linux-python-aarch64:
    uses: ./.github/workflows/linux_python_aarch64_release.yml

  windows-python-x64:
    uses: ./.github/workflows/windows_python_release.yml

  publish-python:
    name: Publish Python wheels
    needs:
      - linux-python-amd64
      - linux-python-aarch64
      - windows-python-x64
    runs-on: ubuntu-22.04
    env:
      PYPI_API_TOKEN: ${{ secrets.PYLEBAI }}
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: lebai-*-whl
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -l dist

      - name: Check wheels
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: lebai-python-wheels
          path: dist/*.whl

      - name: Publish PyPI
        if: env.PYPI_API_TOKEN != ''
        run: python -m twine upload --skip-existing --verbose -u __token__ -p "${PYPI_API_TOKEN}" dist/*.whl
