name: Python release
run-name: ${{ github.actor }} Python release

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      PYLEBAI:
        required: false
  push:
    tags:
      - v*.*.*

permissions:
  contents: read

jobs:
  linux-python:
    name: Linux ${{ matrix.name }} Python wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: amd64
            runner: ubuntu-22.04
            container: quay.io/pypa/manylinux_2_28_x86_64
          - name: aarch64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and smoke-test wheels
        run: scripts/build_python_wheels_manylinux.sh wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: lebai-linux-${{ matrix.name }}-whl
          path: wheelhouse/*.whl

  windows-python:
    name: Windows x64 Python wheels
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set Python version for artifact name
        run: |
          $version = "${{ matrix.python-version }}".Replace(".", "")
          echo "PYTHON_VERSION_NO_DOT=$version" >> $env:GITHUB_ENV

      - name: Ensure SWIG is available
        run: |
          if (!(Get-Command swig -ErrorAction SilentlyContinue)) {
            choco install swig -y --no-progress
          }
          swig -version

      - name: Install Python build tooling
        run: python.exe -m pip install --upgrade build setuptools wheel delvewheel

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DBUILD_PYTHON=ON -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF -DBUILD_DOCUMENTATION=OFF -DFETCH_PYTHON_DEPS=OFF -DPython3_EXECUTABLE="${{ env.pythonLocation }}\python.exe"

      - name: Build
        run: cmake --build build --config Release --target python_package

      - name: Repair wheel
        run: |
          New-Item -ItemType Directory -Force -Path repaired_wheels
          delvewheel repair --add-path build\Release -w repaired_wheels build\python\dist\*.whl

      - name: Smoke-test wheel
        run: .\scripts\python_wheel_smoke.ps1 -WheelDir repaired_wheels -Python python.exe -VenvDir build\python-smoke-venv

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: lebai-win-x64-${{ env.PYTHON_VERSION_NO_DOT }}-whl
          path: repaired_wheels/*.whl

  publish-python:
    name: Publish Python wheels
    needs:
      - linux-python
      - windows-python
    runs-on: ubuntu-22.04
    env:
      PYPI_API_TOKEN: ${{ secrets.PYLEBAI }}
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: lebai-*-whl
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -l dist

      - name: Check wheels
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: lebai-python-wheels
          path: dist/*.whl

      - name: Publish PyPI
        if: env.PYPI_API_TOKEN != ''
        run: python -m twine upload --skip-existing --verbose -u __token__ -p "${PYPI_API_TOKEN}" dist/*.whl
