name: Windows Python build

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  windows-python-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Ensure SWIG is available
        run: |
          if (!(Get-Command swig -ErrorAction SilentlyContinue)) {
            choco install swig -y --no-progress
          }
          swig -version

      - name: Install Python build tooling
        run: python.exe -m pip install --upgrade build setuptools wheel delvewheel

      - name: Configure
        run: cmake -S. -Bbuild -G "Visual Studio 17 2022" -DBUILD_PYTHON=ON -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF -DBUILD_DOCUMENTATION=OFF -DFETCH_PYTHON_DEPS=OFF -DPython3_EXECUTABLE="${{ env.pythonLocation }}\python.exe"

      - name: Build
        run: cmake --build build --config Release --target python_package

      - name: Repair wheel
        run: |
          New-Item -ItemType Directory -Force -Path repaired_wheels
          delvewheel repair --add-path build\Release -w repaired_wheels build\python\dist\*.whl

      - name: Smoke-test wheel
        run: .\scripts\python_wheel_smoke.ps1 -WheelDir repaired_wheels -Python python.exe -VenvDir build\python-smoke-venv

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: lebai-windows-x64-whl
          path: repaired_wheels/*.whl
