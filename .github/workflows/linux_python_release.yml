name: Linux Python release

on:
  workflow_dispatch:
  workflow_call:
  push:
    tags:
      - v1.*.*

permissions:
  contents: read

jobs:
  linux-python-release:
    runs-on: ubuntu-22.04
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and smoke-test wheels
        run: scripts/build_python_wheels_manylinux.sh wheelhouse

      - name: Upload PyPI
        run: |
          /opt/python/cp310-cp310/bin/python -m pip install --upgrade twine
          /opt/python/cp310-cp310/bin/python -m twine upload --skip-existing --verbose -u __token__ -p "${{ secrets.PYLEBAI }}" wheelhouse/*.whl

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: lebai-linux-amd64-whl
          path: wheelhouse/*.whl
