name: Windows dotnet release
run-name: ${{ github.actor }} Windows dotnet release
on:
  workflow_dispatch:
  workflow_call:
jobs:
  windows_dotnet_build_and_release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v1

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Configure
        run: cmake -S. -Bbuild -G "Visual Studio 17 2022" -DBUILD_DOTNET=ON -DBUILD_DOCUMENTATION=OFF

      - name: Build
        run: cmake --build build

      - name: Upload package
        uses: actions/upload-artifact@v4
        id: artifact
        with:
          name: lebai-win-x64-nupkg
          path: |
            build/dotnet/packages/*.nupkg
      - name: Upload native assets
        uses: actions/upload-artifact@v4
        with:
          name: lebai-dotnet-native-win-x64
          path: build/dotnet/native-assets/**
