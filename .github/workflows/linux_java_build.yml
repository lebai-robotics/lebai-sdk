name: Linux java build
run-name: ${{ github.actor }} Linux java build
on:
  workflow_dispatch:
  pull_request:
jobs:
  linux_java_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install SWIG
        run: |
          sudo apt-get update
          sudo apt-get install -y swig

      - name: Configure
        run: cmake -S . -B build -DBUILD_JAVA=ON -DBUILD_DOCUMENTATION=OFF -DBUILD_EXAMPLES=OFF -DBUILD_TESTING=OFF -DSKIP_GPG=ON

      - name: Build Java package
        run: cmake --build build --target java_package

      - name: Upload Java jars
        uses: actions/upload-artifact@v4
        with:
          name: lebai-java-build-jars
          path: |
            build/java/lebai-java/target/*.jar
            build/java/lebai-*/target/*.jar
